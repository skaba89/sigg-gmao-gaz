# ============================================================
# SIGG GMAO Enterprise Suite - Docker Compose (Production)
# Societe Interprofessionnelle du Gaz de Guinee
# ============================================================
# Usage:
#   docker-compose up -d --build          # Demarrer tous les services
#   docker-compose logs -f app            # Suivre les logs de l'app
#   docker-compose down -v                # Arreter et supprimer les volumes
# ============================================================

version: "3.9"

services:
  # ============================================================
  # PostgreSQL - Base de donnees principale (production)
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: sigg-gmao-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sigg_gmao}
      POSTGRES_USER: ${POSTGRES_USER:-sigg_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_strong_password_2024}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sigg_admin} -d ${POSTGRES_DB:-sigg_gmao}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - sigg-network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"

  # ============================================================
  # Redis - Cache & Sessions
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: sigg-gmao-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-changeme_redis_password_2024}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_redis_password_2024}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sigg-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 64M
          cpus: "0.1"

  # ============================================================
  # MinIO - Stockage de fichiers (S3-compatible)
  # ============================================================
  minio:
    image: minio/minio:latest
    container_name: sigg-gmao-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-sigg_minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-changeme_minio_secret_2024}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_CONSOLE_URL:-http://localhost:9001}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 3
    networks:
      - sigg-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.1"

  # ============================================================
  # Next.js Application - SIGG GMAO
  # ============================================================
  app:
    build:
      context: ..
      dockerfile: download/Dockerfile
    container_name: sigg-gmao-app
    restart: unless-stopped
    environment:
      # Base de donnees
      DATABASE_URL: postgresql://${POSTGRES_USER:-sigg_admin}:${POSTGRES_PASSWORD:-changeme_strong_password_2024}@postgres:5432/${POSTGRES_DB:-sigg_gmao}?schema=public

      # Authentification
      TOKEN_SECRET: ${TOKEN_SECRET:-changeme_jwt_secret_min_32_characters_2024}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-changeme_nextauth_secret_min_32_chars}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost}

      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme_redis_password_2024}@redis:6379/0

      # Stockage fichiers
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_ACCESS_KEY: ${MINIO_ACCESS_KEY:-sigg_minio_admin}
      STORAGE_SECRET_KEY: ${MINIO_SECRET_KEY:-changeme_minio_secret_2024}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-sigg-gmao}

      # Application
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"

      # IA (optionnel)
      AI_API_KEY: ${AI_API_KEY:-}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - sigg-network
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"
      replicas: 2
    labels:
      - "com.sigg.service=gmao-app"
      - "com.sigg.environment=production"
      - "com.sigg.version=1.0.0"

  # ============================================================
  # Nginx - Reverse Proxy & Load Balancer
  # ============================================================
  nginx:
    image: nginx:1.25-alpine
    container_name: sigg-gmao-nginx
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - ./docker/nginx/logs:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - sigg-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 32M
          cpus: "0.1"

# ============================================================
# Volumes persistants
# ============================================================
volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./docker/volumes/postgres

  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./docker/volumes/redis

  minio_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./docker/volumes/minio

# ============================================================
# Resseau dedie
# ============================================================
networks:
  sigg-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
    labels:
      - "com.sigg.network=gmao-internal"
