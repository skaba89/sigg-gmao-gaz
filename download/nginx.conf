# ============================================================
# SIGG GMAO Enterprise Suite - Nginx Reverse Proxy
# Societe Interprofessionnelle du Gaz de Guinee
# ============================================================
# Placement: /etc/nginx/nginx.conf
# Test:      nginx -t
# Reload:    nginx -s reload
# ============================================================

# Parametres globaux
user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    # ----------------------------------------------------------
    # Configuration de base
    # ----------------------------------------------------------
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Format de log personnalise
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main buffer=32k flush=5m;
    error_log /var/log/nginx/error.log warn;

    # Optimisations reseau
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 100;
    reset_timedout_connection on;
    client_body_timeout 60;
    send_timeout 60;

    # Tailles limites
    client_max_body_size 50m;
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;

    # ----------------------------------------------------------
    # Limitation de debit (Rate Limiting)
    # ----------------------------------------------------------
    # Zone pour les requetes generales
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;

    # Zone pour les requetes API
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;

    # Zone pour les tentatives de connexion
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # Zone pour les connexions simultanees
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Parametres de limitation
    limit_req_status 429;
    limit_conn_status 429;
    limit_req_log_level warn;
    limit_conn_log_level warn;

    # ----------------------------------------------------------
    # Compression Gzip
    # ----------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # ----------------------------------------------------------
    # Brotli (si installe)
    # ----------------------------------------------------------
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css application/javascript application/json image/svg+xml;

    # ----------------------------------------------------------
    # En-tetes de securite globaux
    # ----------------------------------------------------------
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'none';" always;

    # Supprimer la version Nginx
    server_tokens off;

    # Cacher les en-tetes sensibles
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;

    # ----------------------------------------------------------
    # SSL/TLS Configuration globale
    # ----------------------------------------------------------
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # Protocles et ciphers modernes
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Session SSL
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/nginx/ssl/chain.pem;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ----------------------------------------------------------
    # Upstream - Application Next.js
    # ----------------------------------------------------------
    upstream nextjs_app {
        least_conn;
        server app:3000 max_fails=3 fail_timeout=30s;
        # Pour le load balancing avec plusieurs instances :
        # server app-1:3000 max_fails=3 fail_timeout=30s;
        # server app-2:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ----------------------------------------------------------
    # Redirect HTTP -> HTTPS
    # ----------------------------------------------------------
    server {
        listen 80;
        listen [::]:80;
        server_name gmao.sigg-gn.com www.gmao.sigg-gn.com;

        # Challenge ACME pour Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirection vers HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ----------------------------------------------------------
    # Serveur HTTPS principal
    # ----------------------------------------------------------
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name gmao.sigg-gn.com www.gmao.sigg-gn.com;

        # HSTS (HTTP Strict Transport Security)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # ----------------------------------------------------------
        # Limitation des connexions
        # ----------------------------------------------------------
        limit_conn conn_limit 20;

        # ----------------------------------------------------------
        # Fichiers statiques - Cache agressif
        # ----------------------------------------------------------
        location /_next/static/ {
            proxy_pass http://nextjs_app;
            proxy_cache_valid 200 365d;
            proxy_set_header Host $host;

            # En-tetes de cache pour les assets statiques
            expires 365d;
            add_header Cache-Control "public, immutable";
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;

            # Compression des assets statiques
            gzip_static on;
        }

        # Images et medias
        location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|avif)$ {
            proxy_pass http://nextjs_app;
            proxy_set_header Host $host;

            expires 30d;
            add_header Cache-Control "public, max-age=2592000";
            add_header X-Content-Type-Options "nosniff" always;

            gzip_static on;
        }

        # Polices
        location ~* \.(woff|woff2|ttf|otf|eot)$ {
            proxy_pass http://nextjs_app;
            proxy_set_header Host $host;

            expires 180d;
            add_header Cache-Control "public, immutable";
            add_header Access-Control-Allow-Origin "*";
        }

        # ----------------------------------------------------------
        # API - Limitation de debit specifique
        # ----------------------------------------------------------
        location /api/ {
            limit_req zone=api burst=30 nodelay;

            proxy_pass http://nextjs_app;
            proxy_http_version 1.1;

            # En-tetes de proxy
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 120s;

            # Buffers
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;

            # Pas de cache pour les API
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
            add_header Pragma "no-cache";
        }

        # ----------------------------------------------------------
        # Authentification - Limitation stricte
        # ----------------------------------------------------------
        location /api/auth/login {
            limit_req zone=auth burst=3 nodelay;

            proxy_pass http://nextjs_app;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        location /api/auth/register {
            limit_req zone=auth burst=3 nodelay;

            proxy_pass http://nextjs_app;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ----------------------------------------------------------
        # AI Chat - Timeouts plus longs pour le streaming
        # ----------------------------------------------------------
        location /api/ai/ {
            limit_req zone=api burst=10 nodelay;

            proxy_pass http://nextjs_app;
            proxy_http_version 1.1;

            # Support du streaming SSE
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts plus longs pour l'IA
            proxy_connect_timeout 10s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # ----------------------------------------------------------
        # WebSocket Support
        # ----------------------------------------------------------
        location /ws/ {
            proxy_pass http://nextjs_app;
            proxy_http_version 1.1;

            # En-tetes WebSocket
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts WebSocket
            proxy_connect_timeout 7d;
            proxy_send_timeout 7d;
            proxy_read_timeout 7d;
        }

        # ----------------------------------------------------------
        # Page d'erreur personnalisee
        # ----------------------------------------------------------
        error_page 429 /429.html;
        location = /429.html {
            internal;
            default_type text/html;
            return 429 '<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8"><title>429 - Trop de requetes</title><style>body{font-family:system-ui;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;background:#0f172a;color:#e2e8f0}h1{font-size:4rem;margin-bottom:0.5rem}p{color:#94a3b8}</style></head><body><div style="text-align:center"><h1>429</h1><p>Trop de requetes. Veuillez reessayer dans quelques instants.</p></div></body></html>';
        }

        error_page 502 503 504 /50x.html;
        location = /50x.html {
            internal;
            default_type text/html;
            return 503 '<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8"><title>503 - Service indisponible</title><style>body{font-family:system-ui;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;background:#0f172a;color:#e2e8f0}h1{font-size:4rem;margin-bottom:0.5rem}p{color:#94a3b8}</style></head><body><div style="text-align:center"><h1>503</h1><p>Service temporairement indisponible. Veuillez reessayer ulterieurement.</p></div></body></html>';
        }

        # ----------------------------------------------------------
        # Location par defaut - Proxy vers Next.js
        # ----------------------------------------------------------
        location / {
            limit_req zone=general burst=50 nodelay;

            proxy_pass http://nextjs_app;
            proxy_http_version 1.1;

            # En-tetes de proxy
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            # Keepalive vers l'upstream
            proxy_set_header Connection '';

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Buffers
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 16k;
            proxy_busy_buffers_size 24k;
        }

        # ----------------------------------------------------------
        # Bloquer l'acces aux fichiers sensibles
        # ----------------------------------------------------------
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~ \.(env|git|svn|htaccess|htpasswd)$ {
            deny all;
            access_log off;
            log_not_found off;
        }

        # Fichiers de debug Next.js (desactiver en production)
        location /__nextjs_original-stack-frame {
            deny all;
        }

        location /__next_data_ {
            deny all;
        }
    }
}
